name: Seguridad básica

on:
  push:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Ver estructura del proyecto
        run: ls -R

      # VALIDACIÓN JS
      - name: Validar JavaScript (sintaxis)
        run: |
          if [ -f frontend/app.js ]; then
            node --check frontend/app.js
          fi

      # VALIDACIÓN PHP
      - name: Validar PHP
        run: |
          if [ -f backend/procesar.php ]; then
            php -l backend/procesar.php
          fi

      # DETECCIÓN DE CÓDIGO PELIGROSO
      - name: Detectar código peligroso
        run: |
          grep -r "eval(" . && exit 1 || echo "OK"

      # (Opcional pero útil)
      - name: Detectar console.log (debug en producción)
        run: |
          grep -r "console.log" frontend && exit 1 || echo "Sin logs"

      - name: Tests simulados
        run: echo "Tests OK"

      # ✅ DEPLOY CONTROLADO
      - name: Deploy (solo admin)
        if: github.actor == 'admin-usuario'
        run: echo "Deploy ejecutado"