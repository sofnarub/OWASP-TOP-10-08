name: Seguridad básica

on:
  push:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Ver estructura del proyecto
        run: ls -R

      # Validación JS sin ejecutar DOM
      - name: Validar JavaScript (sintaxis)
        run: |
          if [ -f frontend/app.js ]; then
            node --check frontend/app.js
          fi

      # Validación PHP
      - name: Validar PHP
        run: |
          if [ -f backend/procesar.php ]; then
            php -l backend/procesar.php
          fi

      # Detectar código peligroso (sin falsos positivos)
      - name: Detectar uso de eval
        run: |
          if grep -R "eval(" . --exclude-dir=.github --exclude-dir=node_modules; then
            echo "Uso de eval detectado"
            exit 1
          else
            echo "Sin eval"
          fi

      # Evitar logs en producción
      - name: Detectar console.log
        run: |
          if grep -R "console.log" frontend; then
            echo "console.log detectado"
            exit 1
          else
            echo "Sin logs"
          fi

      - name: Tests simulados
        run: echo "Tests OK"

      # Deploy controlado
      - name: Deploy (solo admin)
        if: github.actor == 'admin-usuario'
        run: echo "Deploy ejecutado"