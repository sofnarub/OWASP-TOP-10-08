name: Deploy seguro

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Verificar estructura del proyecto
        run: |
          echo "Archivos del proyecto:"
          ls -R

      - name: Validar JavaScript
        run: |
          if [ -f frontend/app.js ]; then
            node -c frontend/app.js || echo "Error en JS"
          fi

      - name: Validar PHP (lint)
        run: |
          if [ -f backend/procesar.php ]; then
            php -l backend/procesar.php
          fi

      - name: Ejecutar tests (simulado)
        run: echo "No hay tests definidos aún"

      - name: Deploy (solo admin)
        if: github.actor == 'admin-usuario'
        run: |
          echo "Desplegando aplicación..."